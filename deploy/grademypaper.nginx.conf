server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name api.grademypaper.co.uk;

  ssl_certificate "/etc/letsencrypt/live/api.grademypaper.co.uk/fullchain.pem";
  ssl_certificate_key "/etc/letsencrypt/live/api.grademypaper.co.uk/privkey.pem";

  location / {
    proxy_pass https://localhost:4000;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}

