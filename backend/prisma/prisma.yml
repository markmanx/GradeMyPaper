datamodel: datamodel.prisma
endpoint: ${env:PRISMA_ENDPOINT}
secret: ${env:PRISMA_SECRET}

generate:
  - generator: javascript-client
    output: ./generated
  - generator: graphql-schema
    output: ./generated/prisma.graphql

hooks:
  post-deploy:
    - prisma generate

seed:
  run: node ./seed/index.js
