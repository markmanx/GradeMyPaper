# import * from "./prisma/generated/prisma.graphql"

type User {
  id: String!
  email: String!
  credits: Int!
}

type Query {
  me: User
  protectedQuery: String!
  request: Request
}

type CheckoutSessionStatus {
  sessionId: String
}

type Mutation {
  createCheckoutSession: CheckoutSessionStatus!
  initiateRequest: Request
}
